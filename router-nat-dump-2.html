function pageSaveCheckValue()
{
var WANIpRange = getValue("ExternalIPRange_text");
var WANIpStart = WANIpRange.split("-")[0];
var WANIpEnd = WANIpRange.split("-")[1];
if(checkLanIPAddress(WANIpStart,"ExternalIPRange_text","Fnt_ExternalIPRange") != true)
{
return false;
}
if(checkLanIPAddress(WANIpEnd,"ExternalIPRange_text","Fnt_ExternalIPRange") != true)
{
return false;
}
for(var i=0; i<3; i++)
{
if(WANIpStart.split('.')[i] != WANIpEnd.split('.')[i])
{
var msg = getmsg(1027);
ShowErrorForCom("ExternalIPRange_text","Fnt_ExternalIPRange",msg);
return false;
}
}
if(parseInt(WANIpStart.split('.')[3]) > parseInt(WANIpEnd.split('.')[3]))
{
var msg = getmsg(1028);
ShowErrorForCom("ExternalIPRange_text","Fnt_ExternalIPRange",msg);
return false;
}
return true;
}
function pageCheckValue()
{
var WANIpRange = getValue("ExternalIPRange_text");
var WANIpStart = WANIpRange.split("-")[0];
var WANIpEnd = WANIpRange.split("-")[1];
if(checkLanIPAddress(WANIpStart,"ExternalIPRange_text","Fnt_ExternalIPRange") != true)
{
return false;
}
if(checkLanIPAddress(WANIpEnd,"ExternalIPRange_text","Fnt_ExternalIPRange") != true)
{
return false;
}
for(var i=0; i<3; i++)
{
if(WANIpStart.split('.')[i] != WANIpEnd.split('.')[i])
{
var msg = getmsg(1027);
ShowErrorForCom("ExternalIPRange_text","Fnt_ExternalIPRange",msg);
return false;
}
}
if(parseInt(WANIpStart.split('.')[3]) > parseInt(WANIpEnd.split('.')[3]))
{
var msg = getmsg(1028);
ShowErrorForCom("ExternalIPRange_text","Fnt_ExternalIPRange",msg);
return false;
}
var WANIp = getValue("ExternalIP_text");
if(checkLanIPAddress(WANIp,"ExternalIP_text","Fnt_ExternalIP") != true)
{
return false;
}
for(var j=0; j<3; j++)
{
if(WANIp.split('.')[j] != WANIpStart.split('.')[j] || WANIp.split('.')[j] != WANIpEnd.split('.')[j] || WANIpStart.split('.')[j] != WANIpEnd.split('.')[j])
{
var msg = getmsg(1025);
ShowErrorForCom("ExternalIP_text","Fnt_ExternalIP",msg);
return false;
}
}
if(parseInt(WANIp.split('.')[3]) < parseInt(WANIpStart.split('.')[3]) || parseInt(WANIp.split('.')[3]) > parseInt(WANIpEnd.split('.')[3]))
{
var msg = getmsg(1026);
ShowErrorForCom("ExternalIP_text","Fnt_ExternalIP",msg);
return false;
}
var MinExtPort = getValue("ExternalPort_text");
if(Check_IntegerRange(MinExtPort,1,65535,"ExternalPort_text","Fnt_ExternalPort")!=true)
{
return false;
}
var Protocol = getValue("PortMappingProtocol_select");
if(checkNull(Protocol) != true)
{
msg = getmsg(101);
ShowErrorForCom("Fnt_PortMappingProtocol","Fnt_PortMappingProtocol",msg);
return false;
}
var InternalHost = getValue("InternalClient_text");
if(checkLanIPAddress(InternalHost,"InternalClient_text","Fnt_InternalClient") != true)
{
return false;
}
var MinIntPort = getValue("InternalPort_text");
if(Check_IntegerRange(MinIntPort,1,65535,"InternalPort_text","Fnt_InternalPort")!=true)
{
return false;
}
return true;
}
function Check_IntegerRange(value,min,max,Frm,Fnt)
{
var tem = checkIntegerRange(value,min,max);
if(tem == -1)
{
msg = getmsg(101);
ShowErrorForCom(Frm,Fnt,msg);
return false;
}
else if(tem == -2)
{
msg = getmsg(115);
ShowErrorForCom(Frm,Fnt,msg);
return false;
}
else if(tem == -3)
{
msg = getmsg(116,min,max);
ShowErrorForCom(Frm,Fnt,msg);
return false;
}
return true;
}
function checkLanIPAddress(lanip,Frm,Fnt)
{
var msg = "";
if(checkNull(lanip) != true)
{
msg = getmsg(101);
ShowErrorForCom(Frm,Fnt,msg);
return false;
}
if(checkIpAddress(lanip) != true)
{
msg = getmsg(108);
ShowErrorForCom(Frm,Fnt,msg);
return false;
}
if(lanip == "0.0.0.0")
{
msg = getmsg(141);
ShowErrorForCom(Frm,Fnt,msg);
return false;
}
if(CheckSpecialIp(lanip) != true)
{
msg = getmsg(108);
ShowErrorForCom(Frm,Fnt,msg);
return false;
}
return true;
}
function CheckSpecialIp(value)
{
var ip;
ip = value.split('.');
if(Number(ip[0])==127)
{
return false ;
}
else if(Number(ip[0])>=224)
{
return false ;
}
else if(Number(ip[0])<1)
{
return false ;
}
return true;
}
